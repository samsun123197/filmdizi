<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmDizi | TMDB Portal</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- CSS Dosyamız -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 id="site-title">FilmDizi</h1>
        <nav>
            <input 
                type="text" 
                id="search" 
                placeholder="Film veya dizi ara..." 
                autocomplete="off"
            >
        </nav>
        <div class="filter-container">
            <button class="btn-genre" onclick="filterGenre('28')">Aksiyon</button>
            <button class="btn-genre" onclick="filterGenre('35')">Komedi</button>
            <button class="btn-genre" onclick="filterGenre('878')">Bilim Kurgu</button>
            <!-- Yeni Yerli Butonu -->
            <button class="btn-genre" onclick="showTurkishMovies()">Yerli</button>
            <button class="btn-genre btn-fav" onclick="showFavorites()">❤ Favorilerim</button>
        </div>
    </header>

    <main id="movie-container">
        <p class="status-msg">İçerikler yükleniyor...</p>
    </main>

    <!-- Detay Penceresi (Modal) -->
    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-details">
                <!-- İçerik JS ile dolacak -->
            </div>
        </div>
    </div>

    <div class="pagination">
        <button id="load-more" onclick="loadMore()">Daha Fazla Yükle</button>
    </div>

    <footer>
        <p>&copy; 2026 FilmDizi - TMDB API Altyapısı ile Özgür Koç tarafından hazırlanmıştır.</p>
    </footer>

    <!-- JavaScript Dosyamız -->
    <script src="script.js"></script>
</body>
</html>

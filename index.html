<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmDizi | Favori İçeriklerim</title>
    <!-- Google Fonts: Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- CSS Dosyamız -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>FilmDizi</h1>
        <nav>
            <input 
                type="text" 
                id="search" 
                placeholder="Film, dizi veya belgesel ara..." 
                autocomplete="off"
            >
        </nav>
    </header>

    <main id="movie-container">
        <!-- JavaScript ile gelecek olan film kartları burada listelenecek -->
        <p>İçerikler yükleniyor...</p>
    </main>

    <footer>
        <p style="font-size: 0.8rem; margin: 20px 0;">&copy; 2026 FilmDizi - OMDb API altyapısı ile hazırlanmıştır.</p>
    </footer>

    <!-- JavaScript Dosyamız -->
    <script src="script.js"></script>
</body>
</html>

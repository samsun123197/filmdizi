<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmDizi | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 id="site-title">FilmDizi</h1>
        <nav>
            <input type="text" id="search" placeholder="Film veya dizi ara..." autocomplete="off">
        </nav>
        <div class="filter-container">
            <button class="btn-genre" onclick="filterGenre('Action')">Aksiyon</button>
            <button class="btn-genre" onclick="filterGenre('Comedy')">Komedi</button>
            <button class="btn-genre" onclick="filterGenre('Sci-Fi')">Bilim Kurgu</button>
            <button class="btn-genre btn-fav" onclick="showFavorites()">❤ Favorilerim</button>
        </div>
    </header>

    <main id="movie-container">
        <!-- Filmler buraya yüklenecek -->
    </main>

    <div class="pagination">
        <button id="load-more" onclick="loadMore()">Daha Fazla Yükle</button>
    </div>

    <footer>
        <p>&copy; 2026 FilmDizi - OMDb API Altyapısı</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
